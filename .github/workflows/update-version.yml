name: Actualizar versión de WhatsApp

# Ejecuta el scraper a diario y publica el JSON actualizado.
# Si el scraper no encuentra versión, no cambia nada (last-good).

on:
  schedule:
    - cron: "0 6 * * *"        # cada día a las 06:00 UTC
  workflow_dispatch: {}          # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar actualizador
        run: python scripts/update_version.py

      - name: Commit y push si hay cambios
        run: |
          if [[ -n "$(git status --porcelain whatsapp_variants.json)" ]]; then
            git config user.name "waversion-bot"
            git config user.email "waversion-bot@users.noreply.github.com"
            git add whatsapp_variants.json
            git commit -m "chore: actualizar versión de WhatsApp"
            git push
          else
            echo "Sin cambios que publicar."
          fi
