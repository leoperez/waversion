name: Actualizar versión de WhatsApp

# Ejecuta el scraper a diario, publica el JSON actualizado y (si hay versión nueva)
# envía una notificación push a los usuarios vía OneSignal.
# Si el scraper no encuentra versión, no cambia nada (last-good) y no notifica.

on:
  schedule:
    - cron: "0 6 * * *"        # cada día a las 06:00 UTC
  workflow_dispatch: {}          # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ONESIGNAL_APP_ID: "5c71d9f7-03c7-4856-bff3-b0b70a54e92a"
      ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ejecutar actualizador
        id: update
        run: python scripts/update_version.py

      - name: Commit y push si hay cambios
        run: |
          if [[ -n "$(git status --porcelain whatsapp_variants.json)" ]]; then
            git config user.name "waversion-bot"
            git config user.email "waversion-bot@users.noreply.github.com"
            git add whatsapp_variants.json
            git commit -m "chore: actualizar versión de WhatsApp"
            git push
          else
            echo "Sin cambios que publicar."
          fi

      - name: Notificar a usuarios (OneSignal)
        # Solo si hay versión NUEVA y existe la clave secreta configurada.
        if: steps.update.outputs.changed == 'true' && env.ONESIGNAL_REST_API_KEY != ''
        run: python scripts/notify_onesignal.py "${{ steps.update.outputs.version }}"
